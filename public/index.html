<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gehad Elhady - Service Codes</title>
  <link rel="apple-touch-icon" href="/gehadservice/intro.jpg">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="GehadService">
  <meta name="theme-color" content="#10b981" />
  <link rel="manifest" href="/gehadservice/manifest.json?v=3">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
      setTimeout(() => {
        navigator.serviceWorker.register('/gehadservice/sw.js', { scope: '/gehadservice/' })
          .then(r => console.log('SW registered:', r.scope))
          .catch(e => console.warn('SW failed:', e));
      }, 500);
    }
  </script>
</body>
</html>
