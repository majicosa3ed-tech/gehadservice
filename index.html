<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%2310b981' width='100' height='100' rx='20'/><text x='50%' y='55%' font-size='55' fill='white' text-anchor='middle' dominant-baseline='central' font-weight='bold'>GE</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gehad Elhady - Service Codes</title>
    <meta name="description" content="Professional machinery service code calculator for Ropa and Holmer equipment" />
    <link rel="manifest" href="/gehadservice/manifest.json?v=3" />
    <meta name="theme-color" content="#10b981" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GehadService" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        });
        setTimeout(() => {
          navigator.serviceWorker.register('/gehadservice/sw.js', { scope: '/gehadservice/' })
            .then(r => console.log('SW registered:', r.scope))
            .catch(e => console.warn('SW failed:', e));
        }, 500);
      }
    </script>
  </body>
</html>
